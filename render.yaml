# Render Blueprint — deploys both the PostgreSQL database and the backend web service.
# Deploy via: Render Dashboard → New → Blueprint → connect this repo → use this file.

databases:
  - name: atf-db
    databaseName: atf_projects
    user: atf
    plan: free
    postgresMajorVersion: 15

services:
  - type: web
    name: atf-backend
    runtime: node
    rootDir: backend
    plan: free
    # Install deps, generate Prisma client, apply migrations, seed demo data, then start.
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npx ts-node prisma/seed.ts
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: atf-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # Set these in the Render dashboard after the frontend (Vercel) is live:
      - key: FRONTEND_URL
        sync: false
      - key: TWILIO_SID
        sync: false
      - key: TWILIO_TOKEN
        sync: false
      - key: TWILIO_PHONE
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
